<style>
  .error-page {
    min-height: 100vh;
    background: var(--c-navy-900);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px var(--pad-x) 80px;
    position: relative;
    overflow: hidden;
    color: #fff;
  }
  .error-page::before {
    content: "";
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168, 204, 236, 0.08) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
  }
  .error-page::after {
    content: "";
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(26, 58, 107, 0.4) 0%, transparent 70%);
    bottom: -200px; left: -200px;
    pointer-events: none;
  }
  .error-inner {
    position: relative;
    z-index: 1;
    max-width: 540px;
  }
  .error-code {
    font-size: clamp(100px, 18vw, 180px);
    font-weight: 700;
    letter-spacing: -0.05em;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 1px rgba(168, 204, 236, 0.3);
    margin: 0 0 8px;
    user-select: none;
  }
  .error-title {
    font-size: clamp(22px, 3vw, 32px);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #fff;
    margin: 0 0 16px;
  }
  .error-desc {
    font-size: 16px;
    color: rgba(255,255,255,0.65);
    line-height: 1.65;
    margin: 0 0 40px;
  }
  .error-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
</style>
